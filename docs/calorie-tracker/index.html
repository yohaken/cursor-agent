<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Calorie & Protein Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dim: #0ea5e9;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --protein: #a78bfa;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
      padding-bottom: calc(1.5rem + var(--safe-bottom));
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
    }

    header {
      margin-bottom: 1.25rem;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.15rem;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .date-nav button {
      background: var(--surface-2);
      border: none;
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .date-nav button:active { background: var(--border); }

    .date-display {
      text-align: center;
      flex: 1;
    }

    .date-display .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .date-display .value {
      font-size: 1rem;
      font-weight: 600;
    }

    .date-display input[type="date"] {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      width: 100%;
      cursor: pointer;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      box-shadow: var(--shadow);
    }

    .stat-card.full { grid-column: 1 / -1; }

    .stat-card .label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-card .unit {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
    }

    .stat-card.cal .value { color: var(--warning); }
    .stat-card.prot .value { color: var(--protein); }
    .stat-card.balance.positive .value { color: var(--success); }
    .stat-card.balance.negative .value { color: var(--danger); }
    .stat-card.loss .value { color: var(--accent); }

    .section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.85rem;
    }

    .field {
      margin-bottom: 0.85rem;
    }

    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: 10px;
      color: var(--text);
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .meal-add {
      display: flex;
      gap: 0.5rem;
    }

    .meal-add input {
      flex: 1;
    }

    .btn {
      background: var(--accent-dim);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .meal-list {
      list-style: none;
      margin-top: 0.85rem;
    }

    .meal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--surface-2);
    }

    .meal-item:last-child { border-bottom: none; }

    .meal-info {
      flex: 1;
      min-width: 0;
    }

    .meal-info .meal-nums {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .meal-info .meal-nums span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.82rem;
    }

    .meal-actions {
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .empty-meals {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1rem 0 0.25rem;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .bmr-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.5rem;
      padding: 0.5rem 0.65rem;
      background: var(--bg);
      border-radius: 8px;
    }

    .bmr-note strong { color: var(--accent); }

    .error-toast {
      position: fixed;
      bottom: calc(1rem + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--danger);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 100;
      transition: transform 0.3s ease;
      max-width: calc(100% - 2rem);
      text-align: center;
    }

    .error-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .edit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 50;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      padding-bottom: calc(1rem + var(--safe-bottom));
    }

    .edit-overlay.open { display: flex; }

    .edit-sheet {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }

    .edit-sheet h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .edit-actions .btn { flex: 1; }

    @media (min-width: 480px) {
      .app { padding: 1.5rem; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Calorie & Protein</h1>
      <p>ติดตามแคลอรี่และโปรตีนรายวัน</p>
    </header>

    <nav class="date-nav" aria-label="เลือกวันที่">
      <button type="button" id="btnPrevDay" aria-label="วันก่อนหน้า">‹</button>
      <div class="date-display">
        <div class="label" id="dateLabel">วันนี้</div>
        <input type="date" id="datePicker" aria-label="เลือกวันที่">
      </div>
      <button type="button" id="btnNextDay" aria-label="วันถัดไป">›</button>
    </nav>

    <section class="dashboard" aria-label="สรุปรายวัน">
      <div class="stat-card cal">
        <div class="label">Total Cal</div>
        <div class="value" id="totalCal">0</div>
        <div class="unit">kcal</div>
      </div>
      <div class="stat-card prot">
        <div class="label">Total Protein</div>
        <div class="value" id="totalProt">0</div>
        <div class="unit">g</div>
      </div>
      <div class="stat-card balance" id="balanceCard">
        <div class="label">Balance (Deficit)</div>
        <div class="value" id="balance">0</div>
        <div class="unit">kcal</div>
      </div>
      <div class="stat-card loss">
        <div class="label">Weight Loss Est.</div>
        <div class="value" id="weightLoss">0</div>
        <div class="unit">kg (bl-kg)</div>
      </div>
      <div class="stat-card full">
        <div class="label">Bsum (TDEE)</div>
        <div class="value" id="bsum">0 <span class="unit">kcal</span></div>
        <div class="bmr-note" id="bsumNote"></div>
      </div>
    </section>

    <section class="section" aria-label="ข้อมูลรายวัน">
      <div class="section-title">ข้อมูลรายวัน</div>
      <div class="field-row">
        <div class="field">
          <label for="weight">น้ำหนักปัจจุบัน (kg)</label>
          <input type="number" id="weight" inputmode="decimal" step="0.1" min="0" placeholder="70">
        </div>
        <div class="field">
          <label for="exerciseBurn">Exercise Burn (kcal)</label>
          <input type="number" id="exerciseBurn" inputmode="numeric" step="1" min="0" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label for="workoutProgram">Workout Program</label>
        <textarea id="workoutProgram" placeholder='เช่น "อก 3, หลังแขน 1"' rows="2"></textarea>
      </div>
    </section>

    <section class="section" aria-label="มื้ออาหาร">
      <div class="section-title">มื้ออาหาร (<span id="mealCount">0</span>/7)</div>
      <div class="meal-add">
        <input type="text" id="mealInput" placeholder="Cal,Protein เช่น 450,30" inputmode="text" autocomplete="off">
        <button type="button" class="btn" id="btnAddMeal">เพิ่ม</button>
      </div>
      <p class="hint">รูปแบบ: แคลอรี่,โปรตีน (เช่น 450,30)</p>
      <ul class="meal-list" id="mealList"></ul>
      <p class="empty-meals" id="emptyMeals">ยังไม่มีมื้ออาหาร — เพิ่มมื้อแรกได้เลย</p>
    </section>
  </div>

  <div class="edit-overlay" id="editOverlay" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="edit-sheet">
      <h3 id="editTitle">แก้ไขมื้ออาหาร</h3>
      <div class="field">
        <label for="editMealInput">Cal,Protein</label>
        <input type="text" id="editMealInput" placeholder="450,30">
      </div>
      <div class="edit-actions">
        <button type="button" class="btn btn-ghost" id="btnCancelEdit">ยกเลิก</button>
        <button type="button" class="btn" id="btnSaveEdit">บันทึก</button>
      </div>
    </div>
  </div>

  <div class="error-toast" id="errorToast" role="alert"></div>

  <script>
    const STORAGE_PREFIX = 'calorieTracker:';
    const MAX_MEALS = 7;
    const BMR_MULTIPLIER = 22;
    const KCAL_PER_KG = 7700;

    let currentDate = todayStr();
    let editingMealId = null;

    const $ = (sel) => document.querySelector(sel);

    const els = {
      datePicker: $('#datePicker'),
      dateLabel: $('#dateLabel'),
      btnPrevDay: $('#btnPrevDay'),
      btnNextDay: $('#btnNextDay'),
      totalCal: $('#totalCal'),
      totalProt: $('#totalProt'),
      balance: $('#balance'),
      balanceCard: $('#balanceCard'),
      weightLoss: $('#weightLoss'),
      bsum: $('#bsum'),
      bsumNote: $('#bsumNote'),
      weight: $('#weight'),
      exerciseBurn: $('#exerciseBurn'),
      workoutProgram: $('#workoutProgram'),
      mealInput: $('#mealInput'),
      btnAddMeal: $('#btnAddMeal'),
      mealList: $('#mealList'),
      mealCount: $('#mealCount'),
      emptyMeals: $('#emptyMeals'),
      editOverlay: $('#editOverlay'),
      editMealInput: $('#editMealInput'),
      btnCancelEdit: $('#btnCancelEdit'),
      btnSaveEdit: $('#btnSaveEdit'),
      errorToast: $('#errorToast'),
    };

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function shiftDate(dateStr, days) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function formatDateLabel(dateStr) {
      const today = todayStr();
      if (dateStr === today) return 'วันนี้';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function storageKey(dateStr) {
      return STORAGE_PREFIX + dateStr;
    }

    function defaultDayData() {
      return {
        weight: '',
        exerciseBurn: '',
        workoutProgram: '',
        meals: [],
      };
    }

    function loadDay(dateStr) {
      try {
        const raw = localStorage.getItem(storageKey(dateStr));
        if (!raw) return defaultDayData();
        const data = JSON.parse(raw);
        return {
          weight: data.weight ?? '',
          exerciseBurn: data.exerciseBurn ?? '',
          workoutProgram: data.workoutProgram ?? '',
          meals: Array.isArray(data.meals) ? data.meals : [],
        };
      } catch {
        return defaultDayData();
      }
    }

    function saveDay(dateStr, data) {
      localStorage.setItem(storageKey(dateStr), JSON.stringify(data));
    }

    function getFormData() {
      return {
        weight: els.weight.value,
        exerciseBurn: els.exerciseBurn.value,
        workoutProgram: els.workoutProgram.value,
        meals: loadDay(currentDate).meals,
      };
    }

    function persistForm() {
      saveDay(currentDate, getFormData());
    }

    function parseMealInput(text) {
      const trimmed = text.trim();
      if (!trimmed) return null;

      const parts = trimmed.split(',').map((s) => s.trim());
      if (parts.length !== 2) return null;

      const calories = parseFloat(parts[0]);
      const protein = parseFloat(parts[1]);

      if (isNaN(calories) || isNaN(protein) || calories < 0 || protein < 0) return null;

      return { calories, protein };
    }

    function calcBMR(weight) {
      const w = parseFloat(weight);
      if (isNaN(w) || w <= 0) return 0;
      return w * BMR_MULTIPLIER;
    }

    function calculate(data) {
      const totalCal = data.meals.reduce((s, m) => s + m.calories, 0);
      const totalProt = data.meals.reduce((s, m) => s + m.protein, 0);
      const baseBMR = calcBMR(data.weight);
      const exercise = parseFloat(data.exerciseBurn) || 0;
      const bsum = baseBMR + exercise;
      const balance = totalCal - bsum;
      const weightLoss = bsum > 0 || totalCal > 0 ? balance / KCAL_PER_KG : 0;

      return { totalCal, totalProt, baseBMR, exercise, bsum, balance, weightLoss };
    }

    function renderDashboard(stats) {
      els.totalCal.textContent = Math.round(stats.totalCal);
      els.totalProt.textContent = Math.round(stats.totalProt * 10) / 10;

      const balRounded = Math.round(stats.balance);
      els.balance.textContent = (balRounded > 0 ? '+' : '') + balRounded;
      els.balanceCard.classList.toggle('positive', stats.balance > 0);
      els.balanceCard.classList.toggle('negative', stats.balance < 0);

      const wl = stats.weightLoss;
      const wlStr = (wl >= 0 ? '+' : '') + (Math.round(wl * 1000) / 1000);
      els.weightLoss.textContent = wlStr;

      els.bsum.innerHTML = Math.round(stats.bsum) + ' <span class="unit">kcal</span>';

      const w = parseFloat(els.weight.value);
      if (!isNaN(w) && w > 0) {
        els.bsumNote.innerHTML =
          'Base BMR = <strong>' + Math.round(stats.baseBMR) + '</strong> kcal (' + w + ' kg × ' + BMR_MULTIPLIER + ')'
          + ' + Exercise <strong>' + Math.round(stats.exercise) + '</strong> kcal';
      } else {
        els.bsumNote.innerHTML = 'กรอกน้ำหนักเพื่อคำนวณ Base BMR (' + BMR_MULTIPLIER + ' × kg)';
      }
    }

    function renderMeals(meals) {
      els.mealCount.textContent = meals.length;
      els.btnAddMeal.disabled = meals.length >= MAX_MEALS;
      els.emptyMeals.style.display = meals.length === 0 ? 'block' : 'none';
      els.mealList.innerHTML = '';

      meals.forEach((meal, idx) => {
        const li = document.createElement('li');
        li.className = 'meal-item';
        li.innerHTML =
          '<div class="meal-info">'
          + '<div class="meal-nums">' + Math.round(meal.calories) + ' kcal <span>· ' + meal.protein + 'g protein</span></div>'
          + '</div>'
          + '<div class="meal-actions">'
          + '<button type="button" class="btn btn-ghost btn-icon" data-action="edit" data-id="' + meal.id + '" aria-label="แก้ไขมื้อ ' + (idx + 1) + '">✎</button>'
          + '<button type="button" class="btn btn-danger btn-icon" data-action="delete" data-id="' + meal.id + '" aria-label="ลบมื้อ ' + (idx + 1) + '">✕</button>'
          + '</div>';
        els.mealList.appendChild(li);
      });
    }

    function refresh() {
      const data = loadDay(currentDate);
      els.weight.value = data.weight;
      els.exerciseBurn.value = data.exerciseBurn;
      els.workoutProgram.value = data.workoutProgram;
      renderMeals(data.meals);
      renderDashboard(calculate(data));
    }

    function setDate(dateStr) {
      currentDate = dateStr;
      els.datePicker.value = dateStr;
      els.dateLabel.textContent = formatDateLabel(dateStr);
      els.btnNextDay.disabled = dateStr >= todayStr();
      refresh();
    }

    function addMeal() {
      const parsed = parseMealInput(els.mealInput.value);
      if (!parsed) {
        showError('รูปแบบไม่ถูกต้อง — ใช้ Cal,Protein เช่น 450,30');
        return;
      }

      const data = loadDay(currentDate);
      if (data.meals.length >= MAX_MEALS) {
        showError('เพิ่มได้สูงสุด ' + MAX_MEALS + ' มื้อต่อวัน');
        return;
      }

      data.meals.push({
        id: crypto.randomUUID(),
        calories: parsed.calories,
        protein: parsed.protein,
      });

      saveDay(currentDate, {
        weight: els.weight.value,
        exerciseBurn: els.exerciseBurn.value,
        workoutProgram: els.workoutProgram.value,
        meals: data.meals,
      });

      els.mealInput.value = '';
      refresh();
    }

    function deleteMeal(id) {
      const data = loadDay(currentDate);
      data.meals = data.meals.filter((m) => m.id !== id);
      saveDay(currentDate, {
        weight: els.weight.value,
        exerciseBurn: els.exerciseBurn.value,
        workoutProgram: els.workoutProgram.value,
        meals: data.meals,
      });
      refresh();
    }

    function openEdit(id) {
      const meal = loadDay(currentDate).meals.find((m) => m.id === id);
      if (!meal) return;
      editingMealId = id;
      els.editMealInput.value = meal.calories + ',' + meal.protein;
      els.editOverlay.classList.add('open');
      els.editMealInput.focus();
    }

    function closeEdit() {
      editingMealId = null;
      els.editOverlay.classList.remove('open');
    }

    function saveEdit() {
      const parsed = parseMealInput(els.editMealInput.value);
      if (!parsed) {
        showError('รูปแบบไม่ถูกต้อง — ใช้ Cal,Protein เช่น 450,30');
        return;
      }

      const data = loadDay(currentDate);
      const meal = data.meals.find((m) => m.id === editingMealId);
      if (!meal) { closeEdit(); return; }

      meal.calories = parsed.calories;
      meal.protein = parsed.protein;

      saveDay(currentDate, {
        weight: els.weight.value,
        exerciseBurn: els.exerciseBurn.value,
        workoutProgram: els.workoutProgram.value,
        meals: data.meals,
      });

      closeEdit();
      refresh();
    }

    let toastTimer = null;
    function showError(msg) {
      els.errorToast.textContent = msg;
      els.errorToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.errorToast.classList.remove('show'), 2800);
    }

    els.btnPrevDay.addEventListener('click', () => setDate(shiftDate(currentDate, -1)));
    els.btnNextDay.addEventListener('click', () => {
      const next = shiftDate(currentDate, 1);
      if (next <= todayStr()) setDate(next);
    });

    els.datePicker.addEventListener('change', () => {
      const picked = els.datePicker.value;
      if (picked && picked <= todayStr()) setDate(picked);
      else els.datePicker.value = currentDate;
    });

    ['weight', 'exerciseBurn', 'workoutProgram'].forEach((id) => {
      document.getElementById(id).addEventListener('input', () => {
        persistForm();
        renderDashboard(calculate(getFormData()));
      });
    });

    els.btnAddMeal.addEventListener('click', addMeal);
    els.mealInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addMeal(); }
    });

    els.mealList.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.action === 'edit') openEdit(id);
      if (btn.dataset.action === 'delete') deleteMeal(id);
    });

    els.btnCancelEdit.addEventListener('click', closeEdit);
    els.btnSaveEdit.addEventListener('click', saveEdit);
    els.editOverlay.addEventListener('click', (e) => {
      if (e.target === els.editOverlay) closeEdit();
    });

    els.editMealInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
      if (e.key === 'Escape') closeEdit();
    });

    setDate(todayStr());
  </script>
</body>
</html>
