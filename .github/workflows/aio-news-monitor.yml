name: AiO News Monitor

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Monitor AiO news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/monitor_aio_news.py

      - name: Commit seen-news state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update AiO news seen state [skip ci]"
          file_pattern: data/aio-news-seen.json
